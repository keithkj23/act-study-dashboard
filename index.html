<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACT Study Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // Destructure React hooks from global React
    const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════
// SUPABASE CONFIG — Replace these with YOUR project values
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';

// ═══════════════════════════════════════════════════════════
// DEMO MODE — Active when credentials are placeholders
// ═══════════════════════════════════════════════════════════
const DEMO_MODE = SUPABASE_URL.includes('YOUR_SUPABASE_URL_HERE');

const DEMO_USER = {
  id: 'demo-user-001',
  email: 'demo@example.com',
  created_at: new Date().toISOString(),
  user_metadata: {
    first_name: 'Demo',
    last_name: 'Student',
    display_name: 'Demo Student',
    test_date: null
  }
};

// Only create the Supabase client if we have real credentials
const supabase = DEMO_MODE
  ? null
  : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════════════════════
// AUTH SCREEN — Login / Sign Up
// ═══════════════════════════════════════════════════════════
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login"); // "login" or "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [firstName, setFirstName] = useState("");
  const [lastName, setLastName] = useState("");
  const [testDate, setTestDate] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [message, setMessage] = useState("");

  const handleSubmit = async () => {
    if (mode === "signup" && (!firstName || !lastName)) { setError("Please enter your first and last name."); return; }
    setLoading(true);
    setError("");
    setMessage("");

    if (mode === "signup") {
      const { data, error: err } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { first_name: firstName, last_name: lastName, display_name: firstName, test_date: testDate || null } }
      });
      if (err) setError(err.message);
      else if (data.user && !data.session) setMessage("Check your email to confirm your account, then log in!");
      else if (data.session) onLogin(data.session.user);
    } else {
      const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
      if (err) setError(err.message);
      else onLogin(data.session.user);
    }
    setLoading(false);
  };

  const inputClass = "w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/90 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent";

  // Floating background icons
  const floatingIcons = [
    { emoji: "📝", top: "8%", left: "8%", size: "2.5rem", delay: "0s", duration: "6s" },
    { emoji: "🔢", top: "15%", right: "12%", size: "2rem", delay: "1s", duration: "7s" },
    { emoji: "📚", bottom: "20%", left: "10%", size: "2.2rem", delay: "2s", duration: "5s" },
    { emoji: "🔬", top: "40%", right: "8%", size: "1.8rem", delay: "0.5s", duration: "8s" },
    { emoji: "✍️", bottom: "12%", right: "15%", size: "2rem", delay: "3s", duration: "6s" },
    { emoji: "🎯", top: "60%", left: "6%", size: "1.8rem", delay: "1.5s", duration: "7s" },
    { emoji: "📐", top: "25%", left: "20%", size: "1.6rem", delay: "2.5s", duration: "5.5s" },
    { emoji: "🧠", bottom: "30%", right: "20%", size: "2rem", delay: "0.8s", duration: "6.5s" },
  ];

  return (
    <div className="min-h-screen flex items-center justify-center relative overflow-hidden" style={{ background: "linear-gradient(135deg, #1E3A5F 0%, #2D1B69 40%, #1E3A5F 70%, #0F172A 100%)" }}>

      {/* Animated floating icons */}
      {floatingIcons.map((icon, i) => (
        <div key={i} className="absolute opacity-20 pointer-events-none select-none" style={{
          top: icon.top, left: icon.left, right: icon.right, bottom: icon.bottom,
          fontSize: icon.size,
          animation: `floatAuth ${icon.duration} ease-in-out ${icon.delay} infinite`,
        }}>{icon.emoji}</div>
      ))}

      {/* Glowing orbs */}
      <div className="absolute w-72 h-72 rounded-full opacity-15 pointer-events-none" style={{ background: "radial-gradient(circle, #3B82F6, transparent)", top: "-10%", left: "-10%" }} />
      <div className="absolute w-96 h-96 rounded-full opacity-10 pointer-events-none" style={{ background: "radial-gradient(circle, #8B5CF6, transparent)", bottom: "-15%", right: "-10%" }} />
      <div className="absolute w-48 h-48 rounded-full opacity-10 pointer-events-none" style={{ background: "radial-gradient(circle, #10B981, transparent)", top: "50%", left: "60%" }} />

      {/* Main card */}
      <div className="w-full max-w-md mx-4 rounded-3xl p-8 backdrop-blur-2xl bg-white/10 border border-white/20 shadow-2xl relative z-10">

        {/* Header */}
        <div className="text-center mb-6">
          <div className="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-white/10 text-white/60 text-xs font-medium mb-4 border border-white/10">
            📖 Your path to a great score starts here
          </div>
          <h1 className="text-3xl font-black text-white tracking-tight mb-1">ACT Study Dashboard</h1>
          <div className="flex items-center justify-center gap-2 mb-2">
            <div className="h-px flex-1 bg-gradient-to-r from-transparent via-blue-400/40 to-transparent" />
            <span className="text-blue-300/80 text-xs font-semibold tracking-widest uppercase">2025–2026</span>
            <div className="h-px flex-1 bg-gradient-to-r from-transparent via-purple-400/40 to-transparent" />
          </div>
          <p className="text-white/50 text-sm">
            {mode === "login" ? "Welcome back — pick up where you left off." : "Create your account to start studying."}
          </p>
        </div>

        {/* Subject chips */}
        <div className="flex justify-center gap-2 mb-6 flex-wrap">
          {[
            { label: "English", color: "#3B82F6", icon: "📝" },
            { label: "Math", color: "#10B981", icon: "🔢" },
            { label: "Reading", color: "#8B5CF6", icon: "📚" },
            { label: "Science", color: "#F59E0B", icon: "🔬" },
            { label: "Writing", color: "#F43F5E", icon: "✍️" },
          ].map(s => (
            <span key={s.label} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold border" style={{ backgroundColor: `${s.color}15`, color: s.color, borderColor: `${s.color}30` }}>
              {s.icon} {s.label}
            </span>
          ))}
        </div>

        {error && <div className="mb-4 p-3 rounded-xl bg-red-500/20 border border-red-400/30 text-red-200 text-sm">{error}</div>}
        {message && <div className="mb-4 p-3 rounded-xl bg-green-500/20 border border-green-400/30 text-green-200 text-sm">{message}</div>}

        {/* Form fields */}
        <div className="flex flex-col gap-3 mb-5">
          {mode === "signup" && (
            <>
              <div className="flex gap-3">
                <input type="text" placeholder="First Name" value={firstName} onChange={e => setFirstName(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl border border-white/15 bg-white/10 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-transparent" />
                <input type="text" placeholder="Last Name" value={lastName} onChange={e => setLastName(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl border border-white/15 bg-white/10 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-transparent" />
              </div>
              <div className="relative">
                <input type="date" value={testDate} onChange={e => setTestDate(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl border border-white/15 bg-white/10 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-transparent"
                  style={{ colorScheme: "dark" }} />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 text-xs pointer-events-none">Scheduled Test Date (optional)</span>
              </div>
            </>
          )}
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}
            className="w-full px-4 py-3 rounded-xl border border-white/15 bg-white/10 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-transparent" />
          <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleSubmit()}
            className="w-full px-4 py-3 rounded-xl border border-white/15 bg-white/10 text-sm text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400/50 focus:border-transparent" />
        </div>

        <button onClick={handleSubmit} disabled={loading || !email || !password}
          className="w-full py-3.5 rounded-xl font-bold text-white shadow-lg disabled:opacity-40 transition-all hover:scale-[1.02] active:scale-[0.98] text-sm"
          style={{ background: "linear-gradient(135deg, #3B82F6, #8B5CF6, #6366F1)" }}>
          {loading ? "..." : mode === "login" ? "Log In →" : "Create Account →"}
        </button>

        <p className="text-center text-sm text-white/40 mt-5">
          {mode === "login" ? "Don't have an account? " : "Already have an account? "}
          <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); setMessage(""); }}
            className="text-blue-300 font-semibold hover:text-blue-200 transition">
            {mode === "login" ? "Sign Up" : "Log In"}
          </button>
        </p>

        {/* Feature highlights on login */}
        {mode === "login" && (
          <div className="mt-6 pt-5 border-t border-white/10 grid grid-cols-3 gap-3">
            {[
              { icon: "🎴", label: "Flashcards" },
              { icon: "📊", label: "Quizzes" },
              { icon: "⏱", label: "Test Sim" },
            ].map(f => (
              <div key={f.label} className="text-center">
                <div className="text-xl mb-1">{f.icon}</div>
                <div className="text-white/40 text-[10px] font-medium">{f.label}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* CSS animation for floating icons */}
      <style>{`
        @keyframes floatAuth {
          0%, 100% { transform: translateY(0px) rotate(0deg); }
          33% { transform: translateY(-12px) rotate(5deg); }
          66% { transform: translateY(8px) rotate(-3deg); }
        }
      `}</style>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CLOUD SYNC HELPERS — Save/load progress from Supabase
// ═══════════════════════════════════════════════════════════
async function loadCloudProgress(userId) {
  if (DEMO_MODE) return [];
  const { data, error } = await supabase
    .from('user_progress')
    .select('progress_data')
    .eq('user_id', userId)
    .maybeSingle();
  if (error) { console.error('Load error:', error); return []; }
  return data?.progress_data?.examHistory || [];
}

async function saveCloudProgress(userId, examHistory) {
  if (DEMO_MODE) return;
  const payload = { user_id: userId, progress_data: { examHistory }, updated_at: new Date().toISOString() };
  const { error } = await supabase
    .from('user_progress')
    .upsert(payload, { onConflict: 'user_id' });
  if (error) console.error('Save error:', error);
}

// ═══════════════════════════════════════════════════════════
// SINGLE-SESSION ENFORCEMENT
// ═══════════════════════════════════════════════════════════
// Generate a unique token for this browser tab/session
const SESSION_TOKEN = crypto.randomUUID();

async function registerSession(userId) {
  if (DEMO_MODE) return;
  const { error } = await supabase
    .from('user_progress')
    .upsert({ user_id: userId, session_token: SESSION_TOKEN, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
  if (error) console.error('Session register error:', error);
}

async function checkSession(userId) {
  if (DEMO_MODE) return true;
  const { data, error } = await supabase
    .from('user_progress')
    .select('session_token')
    .eq('user_id', userId)
    .maybeSingle();
  if (error) { console.error('Session check error:', error); return true; } // fail open
  // If no row yet or tokens match, session is valid
  if (!data || !data.session_token || data.session_token === SESSION_TOKEN) return true;
  // Token mismatch — another device logged in
  return false;
}

// ═══════════════════════════════════════════════════════════
// USER HELPERS
// ═══════════════════════════════════════════════════════════
function getUserName(user) {
  const meta = user?.user_metadata;
  if (meta?.first_name) return meta.first_name;
  if (meta?.display_name) return meta.display_name;
  return user?.email?.split('@')[0] || 'Student';
}

function getUserFullName(user) {
  const meta = user?.user_metadata;
  if (meta?.first_name && meta?.last_name) return `${meta.first_name} ${meta.last_name}`;
  if (meta?.display_name) return meta.display_name;
  return user?.email?.split('@')[0] || 'Student';
}

function getUserTestDate(user) {
  return user?.user_metadata?.test_date || null;
}

// ═══════════════════════════════════════════════════════════
// PROFILE PAGE
// ═══════════════════════════════════════════════════════════
function ProfilePage({ user, onLogout }) {
  const meta = user?.user_metadata || {};
  const [firstName, setFirstName] = useState(meta.first_name || "");
  const [lastName, setLastName] = useState(meta.last_name || "");
  const [testDate, setTestDate] = useState(meta.test_date || "");
  const [newEmail, setNewEmail] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [loading, setLoading] = useState("");
  const [message, setMessage] = useState({ type: "", text: "" });

  const showMsg = (type, text) => { setMessage({ type, text }); setTimeout(() => setMessage({ type: "", text: "" }), 5000); };

  const updateProfile = async () => {
    if (DEMO_MODE) { showMsg("error", "Profile editing is disabled in demo mode."); return; }
    setLoading("profile");
    const { error } = await supabase.auth.updateUser({ data: { first_name: firstName, last_name: lastName, display_name: firstName, test_date: testDate || null } });
    if (error) showMsg("error", error.message);
    else showMsg("success", "Profile updated! Changes will appear next time you load the app.");
    setLoading("");
  };

  const updateEmail = async () => {
    if (DEMO_MODE) { showMsg("error", "Email changes are disabled in demo mode."); return; }
    if (!newEmail) return;
    setLoading("email");
    const { error } = await supabase.auth.updateUser({ email: newEmail });
    if (error) showMsg("error", error.message);
    else showMsg("success", "Confirmation email sent to your new address. Check your inbox to confirm the change.");
    setLoading("");
    setNewEmail("");
  };

  const updatePassword = async () => {
    if (DEMO_MODE) { showMsg("error", "Password changes are disabled in demo mode."); return; }
    if (newPassword.length < 6) { showMsg("error", "Password must be at least 6 characters."); return; }
    if (newPassword !== confirmPassword) { showMsg("error", "Passwords don't match."); return; }
    setLoading("password");
    const { error } = await supabase.auth.updateUser({ password: newPassword });
    if (error) showMsg("error", error.message);
    else showMsg("success", "Password updated successfully!");
    setLoading("");
    setNewPassword("");
    setConfirmPassword("");
  };

  const daysUntilTest = testDate ? Math.ceil((new Date(testDate) - new Date()) / (1000 * 60 * 60 * 24)) : null;

  const inputClass = "w-full px-4 py-3 rounded-xl border border-gray-200 bg-white/90 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent";
  const btnClass = "px-5 py-2.5 rounded-xl font-semibold text-white text-sm shadow-md disabled:opacity-40 transition";

  return (
    <div className="flex-1 overflow-y-auto" style={{ background: "linear-gradient(135deg, #EFF6FF 0%, #F5F3FF 35%, #FFF7ED 70%, #FFF1F2 100%)" }}>
      <div className="max-w-lg mx-auto px-6 py-8">
        <h2 className="text-2xl font-bold text-gray-800 mb-1">👤 Profile</h2>
        <p className="text-gray-500 text-sm mb-6">Manage your account settings</p>

        {message.text && (
          <div className={`mb-5 p-3 rounded-xl text-sm ${message.type === "error" ? "bg-red-50 border border-red-200 text-red-700" : "bg-green-50 border border-green-200 text-green-700"}`}>
            {message.text}
          </div>
        )}

        {/* Account Info Card */}
        <div className={`rounded-2xl p-5 mb-4 backdrop-blur-xl bg-white/70 border border-white/40 shadow-lg`}>
          <h3 className="font-bold text-gray-700 mb-3">Account Information</h3>
          <div className="flex flex-col gap-2 text-sm">
            <div className="flex justify-between py-2 border-b border-gray-100"><span className="text-gray-500">Name</span><span className="font-medium text-gray-800">{getUserFullName(user)}</span></div>
            <div className="flex justify-between py-2 border-b border-gray-100"><span className="text-gray-500">Email</span><span className="font-medium text-gray-800">{user.email}</span></div>
            {testDate && (
              <div className="flex justify-between py-2 border-b border-gray-100">
                <span className="text-gray-500">Test Date</span>
                <span className="font-medium text-gray-800">
                  {new Date(testDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                  {daysUntilTest > 0 && <span className="ml-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-600">{daysUntilTest} days away</span>}
                  {daysUntilTest <= 0 && daysUntilTest !== null && <span className="ml-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-green-100 text-green-600">Completed</span>}
                </span>
              </div>
            )}
            <div className="flex justify-between py-2 border-b border-gray-100"><span className="text-gray-500">User ID</span><span className="font-mono text-xs text-gray-400">{user.id.slice(0, 8)}...</span></div>
            <div className="flex justify-between py-2"><span className="text-gray-500">Member Since</span><span className="font-medium text-gray-800">{new Date(user.created_at).toLocaleDateString()}</span></div>
          </div>
        </div>

        {/* Edit Profile */}
        <div className={`rounded-2xl p-5 mb-4 backdrop-blur-xl bg-white/70 border border-white/40 shadow-lg`}>
          <h3 className="font-bold text-gray-700 mb-3">Edit Profile</h3>
          <div className="flex flex-col gap-3">
            <div className="flex gap-3">
              <input type="text" value={firstName} onChange={e => setFirstName(e.target.value)} placeholder="First Name" className={inputClass} />
              <input type="text" value={lastName} onChange={e => setLastName(e.target.value)} placeholder="Last Name" className={inputClass} />
            </div>
            <div>
              <label className="text-xs text-gray-500 mb-1 block">Scheduled Test Date</label>
              <input type="date" value={testDate} onChange={e => setTestDate(e.target.value)} className={inputClass} />
            </div>
            <button onClick={updateProfile} disabled={loading === "profile" || (!firstName && !lastName)} className={`${btnClass} w-full`} style={{ backgroundColor: "#3B82F6" }}>
              {loading === "profile" ? "..." : "Save Profile"}
            </button>
          </div>
        </div>

        {/* Update Email */}
        <div className={`rounded-2xl p-5 mb-4 backdrop-blur-xl bg-white/70 border border-white/40 shadow-lg`}>
          <h3 className="font-bold text-gray-700 mb-3">Change Email</h3>
          <p className="text-xs text-gray-500 mb-3">A confirmation link will be sent to your new email address.</p>
          <div className="flex gap-2">
            <input type="email" value={newEmail} onChange={e => setNewEmail(e.target.value)} placeholder="New email address" className={inputClass} />
            <button onClick={updateEmail} disabled={loading === "email" || !newEmail} className={btnClass} style={{ backgroundColor: "#8B5CF6" }}>
              {loading === "email" ? "..." : "Update"}
            </button>
          </div>
        </div>

        {/* Update Password */}
        <div className={`rounded-2xl p-5 mb-4 backdrop-blur-xl bg-white/70 border border-white/40 shadow-lg`}>
          <h3 className="font-bold text-gray-700 mb-3">Change Password</h3>
          <div className="flex flex-col gap-3">
            <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="New password (min 6 characters)" className={inputClass} />
            <input type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="Confirm new password" className={inputClass} />
            <button onClick={updatePassword} disabled={loading === "password" || !newPassword || !confirmPassword} className={`${btnClass} w-full`} style={{ backgroundColor: "#10B981" }}>
              {loading === "password" ? "..." : "Update Password"}
            </button>
          </div>
        </div>

        {/* Logout */}
        <div className={`rounded-2xl p-5 backdrop-blur-xl bg-white/70 border border-white/40 shadow-lg`}>
          <h3 className="font-bold text-gray-700 mb-3">Session</h3>
          <button onClick={onLogout} className="w-full py-3 rounded-xl font-semibold text-red-500 border-2 border-red-200 hover:bg-red-50 transition text-sm">
            🚪 Log Out
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Enhanced ACT (2025-2026) ──
// Science is OPTIONAL and scored separately (not in composite).
// Composite = average of English + Math + Reading only.
// Math now has 4 answer choices instead of 5.
const SECTIONS = {
  english: { name: "English", icon: "📝", accent: "#3B82F6", questions: 50, minutes: 35, desc: "Production of Writing, Knowledge of Language & Conventions", required: true },
  math:    { name: "Math",    icon: "🔢", accent: "#10B981", questions: 45, minutes: 50, desc: "Algebra, functions, geometry, statistics & modeling", required: true },

function chatbotRespond(input) {
  const lower = input.toLowerCase().trim();
  if (!lower) return "Type a question or math expression and I'll help!";

  // Try math evaluation
  try {
    const cleaned = input
      .replace(/what is /i, "")
      .replace(/calculate /i, "")
      .replace(/solve /i, "")
      .replace(/evaluate /i, "")
      .replace(/(\d+)% of (\d+)/i, "($1/100)*$2")
      .replace(/x/g, "*")
      .replace(/÷/g, "/")
      .trim();
    if (/^[\d\s+\-*/().^sqrtincoatelpgb,]+$/i.test(cleaned) || /^\d/.test(cleaned)) {
      const result = math.evaluate(cleaned);
      if (typeof result === "number" || typeof result === "object") {
        const display = typeof result === "number" ? (Number.isInteger(result) ? result : math.round(result, 6)) : result.toString();
        return `🧮 **Result:** ${display}\n\nWant me to explain how to solve this step by step?`;
      }
    }
  } catch (e) { /* not a math expression, continue */ }

  // Try specific computations
  const slopeMatch = lower.match(/slope.*?(-?\d+)[,\s]+(-?\d+).*?(-?\d+)[,\s]+(-?\d+)/);
  if (slopeMatch) {
    const [, x1, y1, x2, y2] = slopeMatch.map(Number);
    const slope = (y2 - y1) / (x2 - x1);
    return `📐 **Slope between (${x1}, ${y1}) and (${x2}, ${y2}):**\nm = (${y2} - ${y1}) / (${x2} - ${x1}) = ${y2-y1} / ${x2-x1} = **${Number.isInteger(slope) ? slope : slope.toFixed(4)}**`;
  }

  const distMatch = lower.match(/distance.*?(-?\d+)[,\s]+(-?\d+).*?(-?\d+)[,\s]+(-?\d+)/);
  if (distMatch) {
    const [, x1, y1, x2, y2] = distMatch.map(Number);
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    return `📐 **Distance between (${x1}, ${y1}) and (${x2}, ${y2}):**\nd = √[(${x2}-${x1})² + (${y2}-${y1})²] = √[${(x2-x1)**2} + ${(y2-y1)**2}] = √${(x2-x1)**2 + (y2-y1)**2} ≈ **${math.round(dist, 4)}**`;
  }

  // Knowledge base matching
  let bestMatch = null;
  let bestScore = 0;
  for (const entry of CHATBOT_KB) {
    const score = entry.keys.filter(k => lower.includes(k)).length;
    if (score > bestScore) { bestScore = score; bestMatch = entry; }
  }
  if (bestMatch && bestScore > 0) return bestMatch.reply;

  // Greeting
  if (/^(hi|hello|hey|yo|sup|what'?s up)/.test(lower)) return "Hey there! 👋 I'm your ACT study buddy. Ask me anything — math problems, grammar rules, test strategies, or just type a math expression to solve it!\n\nType **help** to see everything I can do.";

  // Encouragement
  if (lower.includes("stressed") || lower.includes("nervous") || lower.includes("scared") || lower.includes("worried"))
    return "💪 It's totally normal to feel that way before a big test. Here's what helps:\n\n1. **Focus on progress, not perfection.** Every practice question makes you better.\n2. **Break studying into small chunks** — 25 min study, 5 min break.\n3. **Celebrate small wins** — even getting one more question right is growth.\n4. **Sleep well** — your brain consolidates learning during sleep.\n\nYou've got this! The fact that you're studying puts you ahead. 🌟";

  if (lower.includes("thank")) return "You're welcome! Keep up the great work. Every bit of practice counts! 🌟";

  // Fallback
  return "🤔 I'm not sure about that one, but I can help with:\n\n• **Math calculations** — type any expression (e.g., sqrt(64), 3^4)\n• **ACT strategies** — ask about any section\n• **Grammar rules** — comma usage, parallel structure, etc.\n• **Score info** — scoring, timing, test day tips\n\nTry rephrasing your question or type **help** for the full list!";
}

// Shuffle utility — Fisher-Yates algorithm
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══ QUESTION HISTORY (rotation & dedup) ═══

function getQuestionHistory(sectionKey) {
  try {
    const raw = localStorage.getItem(`act_question_history_${sectionKey}`);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function recordQuestionAttempt(sectionKey, questionId, isCorrect) {
  const hist = getQuestionHistory(sectionKey);
  const prev = hist[questionId] || { seen: 0, correct: 0, lastSeen: 0 };
  hist[questionId] = {
    seen: prev.seen + 1,
    correct: prev.correct + (isCorrect ? 1 : 0),
    lastSeen: Date.now(),
  };
  try { localStorage.setItem(`act_question_history_${sectionKey}`, JSON.stringify(hist)); } catch {}
}

function getRotatedQuestions(sectionKey) {
  const pool = QUESTIONS[sectionKey] || [];
  if (!pool.length) return [];
  const hist = getQuestionHistory(sectionKey);

  const neverSeen = [];
  const prevIncorrect = [];
  const prevCorrect = [];

  pool.forEach(q => {
    const h = hist[q.id];
    if (!h) neverSeen.push(q);
    else if (h.correct < h.seen) prevIncorrect.push(q);
    else prevCorrect.push(q);
  });

  // Sort incorrect and correct by lastSeen ascending (least recent first)
  prevIncorrect.sort((a, b) => (hist[a.id].lastSeen || 0) - (hist[b.id].lastSeen || 0));
  prevCorrect.sort((a, b) => (hist[a.id].lastSeen || 0) - (hist[b.id].lastSeen || 0));

  return [...shuffle(neverSeen), ...prevIncorrect, ...prevCorrect];
}

function shuffleChoices(question) {
  const choices = question.choices;
  if (!choices || choices.length === 0) return question;
  // Build array of indices [0, 1, 2, 3], shuffle them
  const indices = choices.map((_, i) => i);
  const shuffled = shuffle(indices);
  const newChoices = shuffled.map(i => choices[i]);
  // Find where the original answer index ended up
  const newAnswer = shuffled.indexOf(question.answer);
  return { ...question, choices: newChoices, answer: newAnswer };
}

const SIM_SECTIONS = [
  { key: "english", name: "English (Required)", icon: "📝", questions: 50, minutes: 35 },
  { key: "math", name: "Math (Required)", icon: "🔢", questions: 45, minutes: 50 },
  { key: "reading", name: "Reading (Required)", icon: "📚", questions: 36, minutes: 40 },
  { key: "science", name: "Science (Optional)", icon: "🔬", questions: 40, minutes: 40 },
  { key: "writing", name: "Writing (Optional)", icon: "✍️", questions: 1, minutes: 40 },
];

function genSimQs(key) {
  const rotated = getRotatedQuestions(key);
  if (!rotated.length) return [];
  const n = Math.min(SECTIONS[key]?.questions || rotated.length, rotated.length * 3);
  // Fill to required count by cycling through rotated list (max diversity per cycle)
  // Each question gets shuffleChoices applied independently, so even repeated questions
  // will have different choice orderings, making memorization of positions useless.
  const result = Array.from({ length: n }, (_, i) =>
    shuffleChoices({ ...rotated[i % rotated.length], _id: i })
  );
  // Shuffle the final list so repeated questions aren't clustered together
  return shuffle(result);
}

function TestSimulator({ onExit, onFinish, history }) {
  const [phase, setPhase] = useState("setup"); // setup | running | done | review
  const [reviewAttempt, setReviewAttempt] = useState(null);
  const [sel, setSel] = useState({ english: true, math: true, reading: true, science: true, writing: false });
  const [secIdx, setSecIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [answers, setAnswers] = useState({});
  const [timer, setTimer] = useState(0);
  const [warn, setWarn] = useState(false);
  // Store pre-generated questions per section so they don't reshuffle during the test
  const [allQs, setAllQs] = useState({});
  const [examResult, setExamResult] = useState(null);
  const iRef = useRef(null);
  const advanceRef = useRef(null);
  const active = SIM_SECTIONS.filter(s => sel[s.key]);
  const curSec = active[secIdx];
  const curQs = (curSec && allQs[curSec.key]) || [];

  useEffect(() => {
    const h = () => { if (!document.fullscreenElement && phase === "running") setWarn(true); };
    document.addEventListener("fullscreenchange", h);
    return () => document.removeEventListener("fullscreenchange", h);
  }, [phase]);

  // Store advanceSec in a ref so the timer callback always has the latest
  advanceRef.current = () => {
    clearInterval(iRef.current);
    if (secIdx + 1 >= active.length) { document.exitFullscreen?.().catch(() => {}); finishExam(); }
    else { const n = secIdx + 1; setSecIdx(n); setQIdx(0); setPicked(null); setTimer(active[n].minutes * 60); }
  };

  useEffect(() => {
    if (phase === "running" && timer > 0) {
      iRef.current = setInterval(() => setTimer(t => { if (t <= 1) { clearInterval(iRef.current); advanceRef.current(); return 0; } return t - 1; }), 1000);
    }
    return () => clearInterval(iRef.current);
  }, [phase, timer, secIdx]);

  const startSim = () => {
    if (!active.length) return;
    // Pre-generate and shuffle all questions for every selected section ONCE
    const generated = {};
    active.forEach(s => { generated[s.key] = genSimQs(s.key); });
    setAllQs(generated);
    setSecIdx(0); setQIdx(0); setAnswers({}); setPicked(null); setExamResult(null);
    setTimer(active[0].minutes * 60); setPhase("running");
    document.documentElement.requestFullscreen?.().catch(() => {});
  };

  const finishExam = () => {
    // Grade each section and store full question/answer detail for review
    const results = {};
    const reviewData = {}; // { sectionKey: [{ question, choices, answer, picked, correct, context, explanation }] }
    let totalCorrect = 0, totalQs = 0;
    active.forEach((sec, si) => {
      if (sec.key === "writing") return;
      const secQs = allQs[sec.key] || [];
      let correct = 0;
      const secReview = [];
      secQs.forEach((q, qi) => {
        const userPick = answers[`${si}-${qi}`];
        const isCorrect = userPick != null && userPick === q.answer;
        if (isCorrect) correct++;
        // Record attempt to question history for rotation/dedup
        if (q.id != null) recordQuestionAttempt(sec.key, q.id, isCorrect);
        secReview.push({ question: q.question, choices: q.choices, answer: q.answer, picked: userPick, correct: isCorrect, context: q.context, explanation: q.explanation });
      });
      results[sec.key] = { correct, total: secQs.length, pct: secQs.length > 0 ? Math.round((correct / secQs.length) * 100) : 0 };
      reviewData[sec.key] = secReview;
      totalCorrect += correct; totalQs += secQs.length;
    });
    const overall = totalQs > 0 ? Math.round((totalCorrect / totalQs) * 100) : 0;
    const result = { date: new Date().toLocaleString(), sections: results, totalCorrect, totalQs, overall, sectionKeys: active.map(s => s.key).filter(k => k !== "writing"), reviewData };
    setExamResult(result);
    if (onFinish) onFinish(result);
    setPhase("done");
  };

  const m = String(Math.floor(timer / 60)).padStart(2, "0");
  const s = String(timer % 60).padStart(2, "0");

  // Review mode — show full question-by-question review for a past attempt
  if (phase === "review" && reviewAttempt) {
    return <ExamReview attempt={reviewAttempt} onBack={() => { setReviewAttempt(null); setPhase("setup"); }} />;
  }

  if (phase === "setup") return (
    <div className="max-w-2xl mx-auto flex flex-col gap-6 py-4 px-2">
      <div><h2 className="text-2xl font-bold text-gray-800 mb-1">🎯 ACT Test Simulator</h2><p className="text-gray-500 text-sm">Select sections. Goes fullscreen with automatic timer per section.</p></div>
      <div className="flex flex-col gap-3">
        {SIM_SECTIONS.map(s => (
          <label key={s.key} className={`flex items-center gap-4 p-4 rounded-xl cursor-pointer transition-all ${glass} ${glassHover}`} style={{ borderColor: sel[s.key] ? SECTIONS[s.key].accent : "rgba(255,255,255,0.4)" }}>
            <input type="checkbox" checked={sel[s.key]} onChange={e => setSel(p => ({ ...p, [s.key]: e.target.checked }))} className="w-5 h-5 accent-blue-500 rounded" />
            <span className="text-2xl">{s.icon}</span>
            <div><div className="font-semibold text-gray-800">{s.name}</div><div className="text-xs text-gray-500">{s.questions} {s.questions > 1 ? "questions" : "prompt"} · {s.minutes} min</div></div>
          </label>
        ))}
      </div>
      <div className={`rounded-xl p-4 text-sm text-amber-800 ${glass}`} style={{ backgroundColor: "rgba(255,251,235,0.7)" }}>
        <span className="font-bold">⚠️ Before you begin:</span> Fullscreen activates. Exiting triggers a warning. Have scratch paper ready. No guessing penalty — answer everything! Good luck! 🍀
      </div>
      <div className="flex gap-3">
        <button onClick={onExit} className={`px-6 py-3 rounded-xl font-semibold text-gray-700 ${glass}`}>← Back</button>
        <button onClick={startSim} disabled={!active.length} className="flex-1 py-3 rounded-xl font-bold text-white shadow-lg disabled:opacity-40" style={{ background: "linear-gradient(135deg, #1E40AF, #7C3AED)" }}>🚀 Start Exam</button>
      </div>

      {/* Score History */}
      {history && history.length > 0 && (
        <div className="mt-2">
          <h3 className="text-lg font-bold text-gray-700 mb-3">📊 Score History</h3>
          <div className="flex flex-col gap-2">
            {history.slice().reverse().map((h, i) => (
              <div key={i} className={`rounded-xl p-4 ${glass}`}>
                <div className="flex justify-between items-center mb-2">
                  <span className="text-xs text-gray-500">Attempt {history.length - i} — {h.date}</span>
                  <span className="text-lg font-bold" style={{ color: h.overall >= 80 ? "#10B981" : h.overall >= 60 ? "#F59E0B" : "#EF4444" }}>{h.overall}%</span>
                </div>
                <div className="flex items-center gap-1 mb-2">
                  <div className="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden">
                    <div className="h-2 rounded-full transition-all" style={{ width: `${h.overall}%`, backgroundColor: h.overall >= 80 ? "#10B981" : h.overall >= 60 ? "#F59E0B" : "#EF4444" }} />
                  </div>
                  <span className="text-xs text-gray-500 ml-2">{h.totalCorrect}/{h.totalQs}</span>
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                  {h.sectionKeys.map(key => {
                    const r = h.sections[key];
                    if (!r) return null;
                    return (
                      <span key={key} className="text-[11px] font-medium px-2 py-1 rounded-lg" style={{ backgroundColor: SECTIONS[key]?.accent + "20", color: SECTIONS[key]?.accent }}>
                        {SECTIONS[key]?.icon} {r.correct}/{r.total} ({r.pct}%)
                      </span>
                    );
                  })}
                  {h.reviewData && (
                    <button onClick={() => { setReviewAttempt(h); setPhase("review"); }}
                      className="ml-auto text-[11px] font-semibold px-3 py-1 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition shrink-0">
                      📋 Review
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

  if (phase === "done" && examResult) return (
    <div className="max-w-lg mx-auto flex flex-col items-center gap-6 py-8 text-center px-4">
      <div className="text-7xl">{examResult.overall >= 80 ? "🏆" : examResult.overall >= 60 ? "👍" : "📚"}</div>
      <h2 className="text-3xl font-bold text-gray-800">Exam Complete!</h2>

      {/* Overall score */}
      <div className="w-full rounded-2xl p-6 text-center" style={{ background: `linear-gradient(135deg, ${examResult.overall >= 80 ? "#ECFDF5" : examResult.overall >= 60 ? "#FFFBEB" : "#FEF2F2"}, white)` }}>
        <div className="text-5xl font-black mb-1" style={{ color: examResult.overall >= 80 ? "#10B981" : examResult.overall >= 60 ? "#F59E0B" : "#EF4444" }}>{examResult.overall}%</div>
        <div className="text-sm text-gray-500">{examResult.totalCorrect} of {examResult.totalQs} correct</div>
        <div className="mt-3 w-full bg-gray-200 rounded-full h-3 overflow-hidden">
          <div className="h-3 rounded-full transition-all" style={{ width: `${examResult.overall}%`, backgroundColor: examResult.overall >= 80 ? "#10B981" : examResult.overall >= 60 ? "#F59E0B" : "#EF4444" }} />
        </div>
      </div>

      {/* Per-section breakdown */}
      <div className="w-full flex flex-col gap-2">
        <div className="text-sm font-bold text-gray-700 text-left">Section Breakdown</div>
        {examResult.sectionKeys.map(key => {
          const r = examResult.sections[key];
          if (!r) return null;
          const meta = SECTIONS[key];
          return (
            <div key={key} className={`rounded-xl p-4 text-left ${glass}`}>
              <div className="flex justify-between items-center mb-2">
                <span className="font-semibold text-sm text-gray-800">{meta?.icon} {meta?.name}</span>
                <span className="font-bold text-sm" style={{ color: r.pct >= 80 ? "#10B981" : r.pct >= 60 ? "#F59E0B" : "#EF4444" }}>{r.correct}/{r.total} ({r.pct}%)</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2 overflow-hidden">
                <div className="h-2 rounded-full" style={{ width: `${r.pct}%`, backgroundColor: meta?.accent }} />
              </div>
              <div className="text-xs text-gray-500 mt-1">{r.pct >= 80 ? "Strong — keep it up!" : r.pct >= 60 ? "Solid — review missed topics." : "Needs work — focus study time here."}</div>
            </div>
          );
        })}
      </div>

      {/* Advice */}
      <div className={`w-full rounded-xl p-4 text-left text-sm ${glass}`}>
        <div className="font-bold text-gray-700 mb-2">📋 Next Steps</div>
        <div className="text-gray-600 leading-relaxed">
          {examResult.overall >= 80
            ? "Excellent work! Focus on the few questions you missed and keep doing practice tests to maintain this level."
            : examResult.overall >= 60
            ? "Good progress! Review the sections where you scored below 70% — use the flashcards and study notes for those topics, then retake the exam."
            : "Keep going — every practice test teaches you something. Focus on your weakest section first using flashcards and quizzes, then come back for another attempt."}
        </div>
      </div>

      <div className="flex gap-3 w-full">
        <button onClick={() => { setReviewAttempt(examResult); setPhase("review"); }} className="flex-1 px-6 py-3 rounded-xl font-semibold text-white" style={{ background: "linear-gradient(135deg, #8B5CF6, #6366F1)" }}>📋 Review Answers</button>
        <button onClick={() => setPhase("setup")} className="flex-1 px-6 py-3 rounded-xl font-semibold text-white" style={{ backgroundColor: "#3B82F6" }}>🔄 Retake</button>
        <button onClick={onExit} className={`flex-1 px-6 py-3 rounded-xl font-semibold text-gray-700 ${glass}`}>Dashboard</button>
      </div>
    </div>
  );

  const curQ = curQs[qIdx];
  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor: "#0F172A", color: "white" }}>
      {warn && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
          <div className="bg-white rounded-2xl p-8 max-w-sm text-center shadow-2xl">
            <div className="text-5xl mb-4">⚠️</div><h3 className="text-xl font-bold text-gray-800 mb-2">Fullscreen Exited</h3>
            <p className="text-gray-500 text-sm mb-6">On the real ACT, leaving the testing area can result in dismissal. Return to fullscreen to continue.</p>
            <button onClick={() => { setWarn(false); document.documentElement.requestFullscreen?.(); }} className="w-full py-3 rounded-xl font-semibold bg-blue-500 text-white">Return to Fullscreen</button>
          </div>
        </div>
      )}
      <div className="flex items-center justify-between px-6 py-3" style={{ background: "linear-gradient(90deg, #1E293B, #0F172A)" }}>
        <div className="flex items-center gap-3"><span className="text-xl">{curSec?.icon}</span><div><div className="font-bold">{curSec?.name}</div><div className="text-xs text-slate-400">Section {secIdx + 1} of {active.length}</div></div></div>
        <div className="flex items-center gap-4">
          <div className="px-4 py-1.5 rounded-lg font-mono text-lg font-bold" style={{ backgroundColor: timer < 300 ? "#7F1D1D" : "#1E3A5F", color: timer < 300 ? "#FCA5A5" : "#93C5FD" }}>{m}:{s}</div>
          <div className="text-xs text-slate-400">{qIdx + 1} / {curQs.length}</div>
        </div>
      </div>
      <div className="flex gap-1 px-6 pt-3">{active.map((s, i) => <div key={s.key} className="text-xs px-2 py-1 rounded font-medium" style={{ backgroundColor: i < secIdx ? "#10B981" : i === secIdx ? SECTIONS[s.key].accent : "#334155", color: "white" }}>{s.icon} {s.name}</div>)}</div>
      <div className="flex-1 flex flex-col px-6 py-6 max-w-3xl mx-auto w-full">
        {curQ ? (<>
          {curQ.context && <div className="mb-4 p-4 rounded-xl text-sm italic" style={{ backgroundColor: "#1E293B", color: "#94A3B8", borderLeft: `3px solid ${SECTIONS[curSec?.key]?.accent}` }}>{curQ.context}</div>}
          <div className="text-lg font-semibold mb-6">{curQ.question}</div>
          <div className="flex flex-col gap-2.5">{curQ.choices?.map((c, i) => (
            <button key={i} onClick={() => setPicked(i)} className="text-left p-3.5 rounded-xl border-2 font-medium transition-all text-sm"
              style={{ borderColor: picked === i ? SECTIONS[curSec?.key]?.accent : "#334155", backgroundColor: picked === i ? SECTIONS[curSec?.key]?.accent + "30" : "#1E293B", color: picked === i ? "white" : "#CBD5E1" }}>
              {c}
            </button>
          ))}</div>
        </>) : (
          <div className="text-center text-slate-400 py-12"><div className="text-5xl mb-4">✍️</div><div className="text-xl font-semibold mb-2">Writing Section</div><div className="text-sm">Use scratch paper for your essay.</div></div>
        )}
      </div>
      <div className="flex items-center justify-between px-6 py-3" style={{ background: "linear-gradient(90deg, #1E293B, #0F172A)" }}>
        <button onClick={() => setQIdx(i => Math.max(0, i - 1))} disabled={qIdx === 0} className="px-5 py-2 rounded-lg bg-slate-700 font-medium disabled:opacity-40 text-sm">← Prev</button>
        <div className="flex gap-1 flex-wrap max-w-md justify-center">
          {curQs.slice(0, 25).map((_, i) => (
            <button key={i} onClick={() => setQIdx(i)} className="w-6 h-6 rounded text-[10px] font-bold"
              style={{ backgroundColor: i === qIdx ? SECTIONS[curSec?.key]?.accent : answers[`${secIdx}-${i}`] != null ? "#10B981" : "#334155", color: "white" }}>{i + 1}</button>
          ))}
          {curQs.length > 25 && <span className="text-slate-500 text-xs self-center ml-1">+{curQs.length - 25}</span>}
        </div>
        {qIdx + 1 < curQs.length
          ? <button onClick={() => { if (picked != null) setAnswers(p => ({ ...p, [`${secIdx}-${qIdx}`]: picked })); setQIdx(i => i + 1); setPicked(null); }} className="px-5 py-2 rounded-lg bg-slate-700 font-medium text-sm">Next →</button>
          : <button onClick={() => { if (picked != null) setAnswers(p => ({ ...p, [`${secIdx}-${qIdx}`]: picked })); advanceRef.current(); }} className="px-5 py-2 rounded-lg font-semibold text-white text-sm" style={{ backgroundColor: "#10B981" }}>{secIdx + 1 >= active.length ? "Finish ✓" : "Next Section →"}</button>
        }
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// EXAM REVIEW MODE
// ═══════════════════════════════════════════════════════════

function ExamReview({ attempt, onBack }) {
  const [activeSec, setActiveSec] = useState(attempt.sectionKeys[0]);
  const [filter, setFilter] = useState("all"); // all | wrong | right
  const questions = attempt.reviewData?.[activeSec] || [];
  const filtered = filter === "all" ? questions : filter === "wrong" ? questions.filter(q => !q.correct) : questions.filter(q => q.correct);
  const secResult = attempt.sections[activeSec];

  return (
    <div className="min-h-screen flex flex-col" style={{ background: "linear-gradient(180deg, #F8FAFC, #F1F5F9)" }}>
      {/* Header */}
      <div className="px-6 py-4 flex items-center gap-4 text-white" style={{ background: "linear-gradient(135deg, #1E40AF, #7C3AED)" }}>
        <button onClick={onBack} className="p-2 rounded-lg bg-white/20 hover:bg-white/30 font-bold text-lg">←</button>
        <div className="flex-1">
          <h1 className="text-xl font-bold">📋 Exam Review</h1>
          <div className="text-sm opacity-80">{attempt.date} — {attempt.overall}% overall ({attempt.totalCorrect}/{attempt.totalQs})</div>
        </div>
      </div>

      {/* Section tabs */}
      <div className="flex gap-1 px-4 pt-3 overflow-x-auto">
        {attempt.sectionKeys.map(key => {
          const meta = SECTIONS[key];
          const r = attempt.sections[key];
          return (
            <button key={key} onClick={() => { setActiveSec(key); setFilter("all"); }}
              className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold whitespace-nowrap transition-all shrink-0"
              style={activeSec === key
                ? { backgroundColor: meta?.accent + "18", color: meta?.accent, border: `1.5px solid ${meta?.accent}40` }
                : { color: "#6B7280", border: "1.5px solid transparent" }}>
              <span>{meta?.icon}</span> {meta?.name}
              <span className="text-[10px] ml-1 opacity-70">{r?.correct}/{r?.total}</span>
            </button>
          );
        })}
      </div>

      {/* Section score bar */}
      {secResult && (
        <div className="mx-6 mt-3 rounded-xl p-3 flex items-center gap-4" style={{ backgroundColor: SECTIONS[activeSec]?.accent + "10" }}>
          <div className="font-bold text-lg" style={{ color: SECTIONS[activeSec]?.accent }}>{secResult.pct}%</div>
          <div className="flex-1"><ProgressBar value={secResult.correct} max={secResult.total} color={SECTIONS[activeSec]?.accent} /></div>
          <div className="text-xs text-gray-500">{secResult.correct} of {secResult.total} correct</div>
        </div>
      )}

      {/* Filter buttons */}
      <div className="flex gap-2 px-6 mt-3">
        {[{ id: "all", label: `All (${questions.length})` }, { id: "wrong", label: `Wrong (${questions.filter(q => !q.correct).length})` }, { id: "right", label: `Correct (${questions.filter(q => q.correct).length})` }].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
            style={filter === f.id
              ? { backgroundColor: f.id === "wrong" ? "#FEE2E2" : f.id === "right" ? "#D1FAE5" : SECTIONS[activeSec]?.accent + "20", color: f.id === "wrong" ? "#DC2626" : f.id === "right" ? "#059669" : SECTIONS[activeSec]?.accent }
              : { backgroundColor: "#F3F4F6", color: "#6B7280" }}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Questions list */}
      <div className="flex-1 overflow-y-auto px-6 py-4 flex flex-col gap-4">
        {filtered.length === 0 && (
          <div className="text-center text-gray-400 py-12">{filter === "wrong" ? "No wrong answers in this section — great job! 🎉" : "No questions to show."}</div>
        )}
        {filtered.map((q, i) => {
          const origIdx = questions.indexOf(q);
          return (
            <div key={i} className={`rounded-2xl p-5 border-2 ${glass}`}
              style={{ borderColor: q.correct ? "#A7F3D0" : "#FECACA", backgroundColor: q.correct ? "rgba(236,253,245,0.5)" : "rgba(254,242,242,0.5)" }}>
              {/* Status badge */}
              <div className="flex items-center justify-between mb-3">
                <span className="text-xs font-bold px-2 py-1 rounded-full" style={{ backgroundColor: q.correct ? "#D1FAE5" : "#FEE2E2", color: q.correct ? "#059669" : "#DC2626" }}>
                  {q.correct ? "✓ Correct" : "✗ Incorrect"} — Q{origIdx + 1}
                </span>
                {q.picked == null && <span className="text-xs text-gray-400 italic">Unanswered</span>}
              </div>

              {/* Context */}
              {q.context && (
                <div className="mb-3 p-3 rounded-xl text-sm text-gray-600 italic leading-relaxed" style={{ backgroundColor: SECTIONS[activeSec]?.accent + "08", borderLeft: `3px solid ${SECTIONS[activeSec]?.accent}40` }}>
                  {q.context}
                </div>
              )}

              {/* Question */}
              <div className="text-sm font-semibold text-gray-800 mb-3">{q.question}</div>

              {/* Choices */}
              <div className="flex flex-col gap-1.5">
                {q.choices?.map((c, ci) => {
                  const isCorrectAnswer = ci === q.answer;
                  const isUserPick = ci === q.picked;
                  let bg = "bg-gray-50 text-gray-500";
                  let border = "border-transparent";
                  let icon = "";
                  if (isCorrectAnswer) { bg = "bg-emerald-50 text-emerald-800"; border = "border-emerald-300"; icon = "✓ "; }
                  if (isUserPick && !isCorrectAnswer) { bg = "bg-red-50 text-red-800 line-through"; border = "border-red-300"; icon = "✗ "; }
                  if (isUserPick && isCorrectAnswer) { bg = "bg-emerald-100 text-emerald-900"; border = "border-emerald-400"; icon = "✓ "; }
                  return (
                    <div key={ci} className={`rounded-lg px-3 py-2 text-sm border ${bg} ${border}`}>
                      {icon}{c}
                      {isCorrectAnswer && !isUserPick && <span className="ml-2 text-xs font-semibold text-emerald-600">(correct answer)</span>}
                      {isUserPick && !isCorrectAnswer && <span className="ml-2 text-xs font-semibold text-red-500">(your answer)</span>}
                    </div>
                  );
                })}
              </div>

              {/* Explanation */}
              {q.explanation && (
                <div className="mt-3 p-3 rounded-xl text-xs text-blue-800 leading-relaxed" style={{ backgroundColor: "#EFF6FF", borderLeft: "3px solid #93C5FD" }}>
                  <span className="font-bold">Explanation: </span>{q.explanation}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

      <div className="px-6 py-4 flex items-center gap-3" style={{ background: "linear-gradient(135deg, #1E40AF, #7C3AED)", color: "white" }}>
        <div><h1 className="text-xl font-bold">📖 ACT Study Guide</h1><p className="text-sm opacity-80">Everything you need to pass the ACT</p></div>
      </div>
      <div className="p-6 max-w-3xl mx-auto flex flex-col gap-3">
        {GUIDE_SECTIONS.map((sec, i) => (
          <div key={i} className={`rounded-2xl overflow-hidden ${glass}`}>
            <button onClick={() => setOpen(open === i ? null : i)} className="w-full flex items-center gap-4 p-5 text-left hover:bg-white/40 transition">
              <div className="text-2xl">{sec.icon}</div>
              <div className="flex-1 font-bold text-gray-800">{sec.title}</div>

            {open === i && (

          </div>
        ))}

  );

            { i: "📐", t: "On Math, eliminate clearly impossible answers before solving." },
            { i: "📖", t: "On Reading, ALWAYS go back to the passage — never answer from memory." },
            { i: "🔬", t: "On Science, the answer is almost always in the data — no outside knowledge needed." },
            { i: "🎯", t: "Never leave a question blank! There's NO guessing penalty on the ACT." },
          ].map((t, i) => <div key={i} className="flex gap-3 py-2.5 border-b border-gray-100/50 last:border-0"><span className="text-base shrink-0">{t.i}</span><span className="text-sm text-gray-600">{t.t}</span></div>)}
        </div>
      </div>
    </div>
  );
}

function classifyQuestion(sectionKey, question) {
  const text = `${question.question || ""} ${question.context || ""} ${question.explanation || ""}`.toLowerCase();
  const topicMap = TOPIC_TAGS[sectionKey];
  if (!topicMap) return "General";
  for (const [kw, topic] of Object.entries(topicMap.keywords)) {
    if (text.includes(kw)) return topic;
  }
  return topicMap.fallback;
}

function FocusAreasPage({ examHistory }) {
  const [expandedSec, setExpandedSec] = useState(null);

  // Aggregate all wrong answers across all exams
  const analysis = {};
  const sectionKeys = ["english", "math", "reading", "science", "writing"];

  sectionKeys.forEach(sec => {
    const wrongByTopic = {};
    let totalWrong = 0;
    let totalAnswered = 0;

    examHistory.forEach(exam => {
      const reviewData = exam.reviewData?.[sec];
      if (!reviewData) return;
      reviewData.forEach(q => {
        if (q.picked != null) totalAnswered++;
        if (!q.correct && q.picked != null) {
          totalWrong++;
          const topic = classifyQuestion(sec, q);
          if (!wrongByTopic[topic]) wrongByTopic[topic] = { count: 0, questions: [] };
          wrongByTopic[topic].count++;
          wrongByTopic[topic].questions.push(q);
        }
      });
    });

    // Sort topics by frequency of wrong answers (most wrong first)
    const sortedTopics = Object.entries(wrongByTopic)
      .sort((a, b) => b[1].count - a[1].count)
      .map(([topic, data]) => ({ topic, ...data }));

    analysis[sec] = { totalWrong, totalAnswered, topics: sortedTopics };
  });

  const hasData = examHistory.length > 0 && Object.values(analysis).some(a => a.totalWrong > 0);

  // Calculate overall weakness score per section for the summary
  const sectionScores = sectionKeys
    .filter(k => analysis[k].totalAnswered > 0)
    .map(k => ({ key: k, ...analysis[k], pct: analysis[k].totalAnswered > 0 ? Math.round(((analysis[k].totalAnswered - analysis[k].totalWrong) / analysis[k].totalAnswered) * 100) : 100 }))
    .sort((a, b) => a.pct - b.pct);

  return (
    <div className="flex-1 overflow-y-auto" style={{ background: "linear-gradient(135deg, #FFF7ED 0%, #FEF3C7 35%, #ECFDF5 70%, #EFF6FF 100%)" }}>

          {/* ── Overall Summary Cards ── */}

                <div className="text-2xl mb-1">❌</div>
                <div className="text-2xl font-bold text-red-500">{Object.values(analysis).reduce((s, a) => s + a.totalWrong, 0)}</div>
                <div className="text-[11px] text-gray-500">Total Missed</div>
              </div>
              <div className={`rounded-2xl p-4 ${glass}`}>
                <div className="text-2xl mb-1">🎯</div>
                <div className="text-2xl font-bold text-emerald-600">{sectionScores.length > 0 ? sectionScores[sectionScores.length - 1].pct + "%" : "—"}</div>
                <div className="text-[11px] text-gray-500">Best Section</div>

              <div className={`rounded-2xl p-4 ${glass}`}>

                      <div className="font-bold text-gray-800">{sec.name}</div>
                      <div className="text-xs text-gray-500">{data.totalWrong} wrong • {data.topics.length} weak {data.topics.length === 1 ? "topic" : "topics"}</div>

                    <span className="text-gray-400 text-lg transition-transform" style={{ transform: isExpanded ? "rotate(180deg)" : "rotate(0)" }}>▼</span>

                  {isExpanded && (

                            <div>

                                  </div>
                                  {q.explanation && <div className="text-gray-500 mt-1 italic">{q.explanation}</div>}
                                </div>
                              ))}
                              {t.questions.length > 3 && <div className="text-[11px] text-gray-400 italic">+ {t.questions.length - 3} more missed questions</div>}
                            </div>
                          </div>
                        );
                      })}

                      {/* Section-specific Action Plan */}
                      <div className="rounded-xl border-2 border-dashed p-4" style={{ borderColor: `${sec.accent}40`, backgroundColor: `${sec.accent}08` }}>
                        <div className="font-semibold text-sm mb-2" style={{ color: sec.accent }}>📋 {sec.name} Action Plan</div>
                        <div className="text-xs text-gray-700 space-y-1.5">
                          <div>1. Review the <strong>{data.topics[0]?.topic}</strong> flashcards in the {sec.name} tab — this is your biggest gap.</div>
                          {data.topics.length > 1 && <div>2. Practice questions focusing on <strong>{data.topics.slice(0, 3).map(t => t.topic).join(", ")}</strong>.</div>}
                          <div>{data.topics.length > 1 ? "3" : "2"}. Retake a practice exam and track if your score improves in {sec.name}.</div>
                          <div>{data.topics.length > 1 ? "4" : "3"}. Use the chatbot to ask about any {sec.name.toLowerCase()} concepts you find confusing.</div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Sections with no wrong answers */}
            {sectionKeys.filter(k => analysis[k].totalAnswered > 0 && analysis[k].totalWrong === 0).map(secKey => {

              return (

function ACTStudyHub({ user, onLogout }) {
  const [view, setView] = useState("home");
  const [chatOpen, setChatOpen] = useState(false);
  const [examHistory, setExamHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [sessionKicked, setSessionKicked] = useState(false);

  // Verify session is still valid, kick out if not
  const verifySession = async () => {
    const valid = await checkSession(user.id);
    if (!valid) {
      setSessionKicked(true);
      return false;
    }
    return true;
  };

  // Wrap setView with session check
  const safeSetView = async (newView) => {
    const ok = await verifySession();
    if (ok) setView(newView);
  };

  // Load exam history from Supabase on first render
  useEffect(() => {
    loadCloudProgress(user.id).then(history => {
      setExamHistory(history);
      setLoaded(true);
    });
  }, [user.id]);

  // Save exam history to Supabase whenever it changes (after initial load)
  useEffect(() => {
    if (loaded && examHistory.length > 0) {
      verifySession().then(ok => {
        if (ok) saveCloudProgress(user.id, examHistory);
      });
    }
  }, [examHistory, loaded]);

  const handleExamFinish = (result) => {
    setExamHistory(prev => [...prev, result]);
  };

  // Session kicked modal
  if (sessionKicked) return (
    <div className="min-h-screen flex items-center justify-center" style={{ background: "linear-gradient(135deg, #1E3A5F 0%, #2D1B69 40%, #0F172A 100%)" }}>
      <div className="w-full max-w-sm mx-4 rounded-2xl p-8 backdrop-blur-xl bg-white/10 border border-white/20 shadow-2xl text-center">
        <div className="text-5xl mb-4">🔒</div>
        <h2 className="text-xl font-bold text-white mb-2">Session Ended</h2>
        <p className="text-white/50 text-sm mb-6">Your account was logged in on another device. Only one active session is allowed at a time.</p>
        <button onClick={onLogout} className="w-full py-3 rounded-xl font-semibold text-white transition" style={{ background: "linear-gradient(135deg, #3B82F6, #8B5CF6)" }}>
          Back to Login
        </button>
      </div>
    </div>
  );

  // When simulator is active, render it fullscreen without tabs
  if (view === "simulator") {
    return <TestSimulator onExit={() => safeSetView("home")} onFinish={handleExamFinish} history={examHistory} />;
  }

  return (
    <div className="relative min-h-screen flex flex-col" style={{ background: "linear-gradient(180deg, #F8FAFC, #F1F5F9)" }}>
      {/* ── Top Tab Bar ── */}
      <nav className="sticky top-0 z-30 backdrop-blur-xl bg-white/80 border-b border-gray-200/60 shadow-sm">
        <div className="flex items-center px-2 py-1 gap-0.5 overflow-x-auto scrollbar-hide">
          {NAV_TABS.map(tab => {
            const isActive = view === tab.id;
            const sectionAccent = SECTIONS[tab.id]?.accent;
            return (
              <button
                key={tab.id}
                onClick={() => safeSetView(tab.id)}
                className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold whitespace-nowrap transition-all shrink-0 ${isActive ? "shadow-md" : "hover:bg-gray-100/60"}`}
                style={isActive ? {
                  backgroundColor: sectionAccent ? `${sectionAccent}18` : "rgba(99,102,241,0.1)",
                  color: sectionAccent || "#6366F1",
                  border: `1.5px solid ${sectionAccent || "#6366F1"}40`,
                } : {
                  color: "#6B7280",
                  border: "1.5px solid transparent",
                }}
              >
                <span className="text-base">{tab.icon}</span>
                <span className="hidden sm:inline">{tab.label}</span>
              </button>
            );
          })}
          <button onClick={onLogout} className="ml-auto flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold whitespace-nowrap transition-all shrink-0 hover:bg-red-50 text-gray-400 hover:text-red-500" style={{ border: "1.5px solid transparent" }}>
            <span className="text-base">🚪</span>
            <span className="hidden sm:inline">Logout</span>
          </button>
        </div>
      </nav>

      {/* ── Page Content ── */}
      <div className="flex-1 flex flex-col">
        {view === "home" && <HomeDashboard user={user} />}
        {view === "focus" && <FocusAreasPage examHistory={examHistory} />}
        {view === "guide" && <GuidePage />}
        {view === "profile" && <ProfilePage user={user} onLogout={onLogout} />}
        {["english", "math", "reading", "science", "writing"].includes(view) && (
          <SectionPage key={view} sectionKey={view} />
        )}
      </div>

      {/* ── Chatbot FAB ── */}
      {!chatOpen && (
        <button onClick={() => setChatOpen(true)} className="fixed bottom-5 right-5 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl z-40 border-2 border-white/50 active:scale-95 transition-transform" style={{ background: "linear-gradient(135deg, #3B82F6, #8B5CF6)" }}>
          🤖
        </button>
      )}
      {chatOpen && <ChatbotPanel onClose={() => setChatOpen(false)} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP WITH AUTH — Wraps everything with login/session check
// ═══════════════════════════════════════════════════════════
function AppWithAuth() {
  const [user, setUser] = useState(DEMO_MODE ? DEMO_USER : null);
  const [checking, setChecking] = useState(DEMO_MODE ? false : true);

  useEffect(() => {
    if (DEMO_MODE) return; // Skip auth checks in demo mode
    // Check if user is already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      const u = session?.user || null;
      setUser(u);
      if (u) registerSession(u.id); // claim this session
      setChecking(false);
    });
    // Listen for auth changes (login, logout, token refresh)
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      const u = session?.user || null;
      setUser(u);
      if (u && _event === 'SIGNED_IN') registerSession(u.id); // claim on new login
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => {
    if (DEMO_MODE) return; // No-op in demo mode
    await supabase.auth.signOut();
    setUser(null);
  };

  if (checking) return (
    <div className="min-h-screen flex items-center justify-center" style={{ background: "linear-gradient(135deg, #EFF6FF 0%, #F5F3FF 35%, #FFF7ED 70%, #FFF1F2 100%)" }}>
      <div className="text-xl text-gray-400 animate-pulse">Loading...</div>
    </div>
  );

  if (!user) return <AuthScreen onLogin={setUser} />;
  return (
    <React.Fragment>
      {DEMO_MODE && <DemoBanner />}
      <div style={DEMO_MODE ? { paddingTop: '32px' } : {}}>
        <ACTStudyHub user={user} onLogout={handleLogout} />
      </div>
    </React.Fragment>
  );
}

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppWithAuth />);
  </script>
</body>
